name: release

# Tag a version (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build the
# package and cut a GitHub Release with the wheel + sdist attached.
#
# PyPI publishing is done manually with twine (see README / docs), so this workflow
# does NOT upload to PyPI. If you later want automated PyPI publishing, add a job using
# pypa/gh-action-pypi-publish with Trusted Publishing (OIDC).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
