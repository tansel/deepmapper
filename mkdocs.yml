site_name: DeepMapper
site_description: No-filtering, attribute-back analysis of high-dimensional omics.
site_url: https://tansel.github.io/deepmapper/
repo_url: https://github.com/tansel/deepmapper
repo_name: tansel/deepmapper
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables

nav:
  - Home: index.md
  - User manual: USER_MANUAL.md
  - API reference: api.md
  - Reproducing the paper: REPRODUCIBILITY.md
  - Data sources: data-sources.md
  - Using DeepMapper with Claude: claude-skill.md
